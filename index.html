<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeWatch Güvenli Canlı Akış</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px 20px; }
        .btn { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; padding: 20px 40px; font-size: 18px; font-weight: bold; color: #fff; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0,242,254,0.4); transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .status { margin-top: 30px; font-size: 20px; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SafeWatch Stabil Akış Paneli</h1>
    <p>Bağlantı kopmaları engellenmiş, saniye optimize akıllı altyapı.</p>
    <br><br>
    <button class="btn" onclick="canliAkisBaslat()">Saate Bağlan ve Eşitle</button>
    <div class="status" id="status">Cihaz bekleniyor...</div>

<script>
let txCharacteristic = null;
let sonGonderilenSaniye = -1;

async function canliAkisBaslat() {
    document.getElementById("status").innerText = "Cihaz aranıyor...";
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'SafeWatch_PRO' }],
            optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
        });

        document.getElementById("status").innerText = "Bağlanılıyor...";
        const bleserver = await device.gatt.connect();
        const service = await bleserver.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
        txCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
        
        document.getElementById("status").innerText = "CANLI SENKRONİZASYON AKTİF!";
        
        // Akıllı zaman döngüsü - Bağlantıyı koparmayan koruyucu katman
        setInterval(async () => {
            if(txCharacteristic) {
                let simdi = new Date();
                let mevcutSaniye = simdi.getSeconds();
                
                // Sadece saniye değiştiğinde tek bir paket fırlat (Hattı tıkama)
                if(mevcutSaniye !== sonGonderilenSaniye) {
                    sonGonderilenSaniye = mevcutSaniye;
                    
                    let saat = String(simdi.getHours()).padStart(2, '0') + ":" + 
                               String(simdi.getMinutes()).padStart(2, '0') + ":" + 
                               String(mevcutSaniye).padStart(2, '0');
                               
                    let tarih = String(simdi.getDate()).padStart(2, '0') + "." + 
                                String(simdi.getMonth() + 1).padStart(2, '0') + "." + 
                                simdi.getFullYear();
                                
                    let gunler = ["PAZAR", "PAZARTESI", "SALI", "CARSAMBA", "PERSEMBE", "CUMA", "CUMARTESI"];
                    let gun = gunler[simdi.getDay()];
                    
                    // Lokasyon tabanlı canlı hava simülasyon verisi (Burayı ileride Fetch API ile bağlayabiliriz)
                    let temp = "24.5"; 
                    let hum = "52";
                    let press = "1012";

                    let paket = `${saat}|${tarih}|${gun}|${temp}|${hum}|${press}`;
                    let encoder = new TextEncoder();
                    
                    // Gönderim kuyruğu çakışmasın diye try-catch koruması
                    txCharacteristic.writeValue(encoder.encode(paket)).catch(err => {
                        console.log("Paket atlandı, hat korundu.");
                    });
                }
            }
        }, 200); // 200ms'de bir saati kontrol et ama sadece saniye dönünce ateşle

    } catch (error) {
        document.getElementById("status").innerText = "Bağlantı Hatası! Yeniden Deneyin.";
        console.error(error);
    }
}
</script>
</body>
</html>
